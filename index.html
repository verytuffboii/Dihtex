<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dihtex - The Unblocked Browser</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; background: #f1f3f4; }
        
        /* Chromium Style UI */
        .toolbar { background: white; padding: 10px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #ccc; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        #urlInput { flex-grow: 1; padding: 10px 20px; border-radius: 20px; border: 1px solid #dfe1e5; outline: none; font-size: 14px; }
        .btn { cursor: pointer; border: none; background: #4285f4; color: white; padding: 10px 20px; border-radius: 20px; font-weight: bold; }

        #view-container { flex-grow: 1; position: relative; background: white; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Smart Info Card */
        #smart-card { 
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 450px; background: white; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); padding: 25px; display: none; text-align: center; z-index: 10;
        }
        .ans-header { font-size: 14px; color: #5f6368; margin-bottom: 5px; }
        .ans-main { font-size: 40px; font-weight: bold; color: #202124; }
    </style>
</head>
<body>

    <div class="toolbar">
        <button class="btn" style="background:#eee; color:#333" onclick="goHome()">Home</button>
        <input type="text" id="urlInput" placeholder="Ask anything or type a site..." onkeydown="if(event.key==='Enter') executeSearch()">
        <button class="btn" onclick="executeSearch()">Search</button>
    </div>

    <div id="view-container">
        <iframe id="viewport" src="about:blank"></iframe>

        <div id="smart-card" onclick="this.style.display='none'">
            <div id="card-content"></div>
            <p style="font-size: 11px; color: #aaa; margin-top: 15px;">Click card to dismiss</p>
        </div>
    </div>

    <script>
        const viewport = document.getElementById('viewport');
        const urlInput = document.getElementById('urlInput');
        const card = document.getElementById('smart-card');

        function executeSearch() {
            const query = urlInput.value.trim();
            if (!query) return;

            // 1. SMART ANSWER: Is it a time question?
            if (query.toLowerCase().includes('time in')) {
                const city = query.toLowerCase().split('time in')[1].trim();
                showSmartTime(city);
                return;
            }

            // 2. DIRECT SITE: Is it a URL?
            if (query.includes('.') && !query.includes(' ')) {
                const url = query.startsWith('http') ? query : 'https://' + query;
                // Note: High security sites like Google.com still won't load in iframe
                // But general sites like Wikipedia or blogs will.
                loadIframe(url);
                return;
            }

            // 3. FULL SEARCH: Use Whoogle (Unblocked Google Results)
            // We use a public Whoogle instance that allows framing
            const searchUrl = `https://search.carrot.re/search?q=${encodeURIComponent(query)}`;
            loadIframe(searchUrl);
        }

        function loadIframe(url) {
            card.style.display = 'none';
            viewport.src = url;
            viewport.style.display = 'block';
        }

        function showSmartTime(location) {
            try {
                const timeStr = new Date().toLocaleTimeString('en-US', { 
                    timeStyle: 'short', 
                    // This uses your local time; for global time, an API is usually needed
                });
                
                document.getElementById('card-content').innerHTML = `
                    <div class="ans-header">Current local time</div>
                    <div class="ans-main">${timeStr}</div>
                    <div style="color:#34a853; font-weight:bold;">Dihtex Intelligence</div>
                `;
                card.style.display = 'block';
            } catch(e) {
                // If logic fails, just search it
                executeSearch();
            }
        }

        function goHome() {
            card.style.display = 'none';
            viewport.src = 'about:blank';
            urlInput.value = '';
        }
    </script>
</body>
</html>
