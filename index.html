<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dihtex | Chromium-Based Web</title>
    <style>
        :root {
            --bg-color: #f1f3f4;
            --toolbar-color: #ffffff;
            --accent-color: #4285f4;
            --text-main: #202124;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Tab Bar */
        .tab-bar {
            background-color: #dee1e6;
            height: 40px;
            display: flex;
            align-items: flex-end;
            padding-left: 12px;
            user-select: none;
        }

        .tab {
            background-color: var(--toolbar-color);
            width: 210px;
            height: 32px;
            border-radius: 8px 8px 0 0;
            display: flex;
            align-items: center;
            padding: 0 15px;
            font-size: 12px;
            color: var(--text-main);
            box-shadow: 0 -1px 2px rgba(0,0,0,0.05);
            cursor: pointer;
        }

        /* Toolbar / Navigation */
        .toolbar {
            background-color: var(--toolbar-color);
            height: 48px;
            display: flex;
            align-items: center;
            padding: 0 14px;
            border-bottom: 1px solid #d1d1d1;
            gap: 15px;
        }

        .nav-icons {
            display: flex;
            gap: 18px;
            color: #5f6368;
            font-size: 18px;
            font-weight: bold;
        }

        .nav-icons span {
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-icons span:hover { color: var(--accent-color); }

        .address-bar-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
        }

        #urlInput {
            width: 100%;
            height: 30px;
            background-color: #f1f3f4;
            border: 1px solid transparent;
            border-radius: 15px;
            padding: 0 15px;
            outline: none;
            font-size: 14px;
            transition: all 0.2s;
        }

        #urlInput:focus {
            background-color: #fff;
            border: 1px solid var(--accent-color);
            box-shadow: 0 0 4px rgba(66,133,244,0.3);
        }

        /* Main Viewport */
        #content-area {
            flex-grow: 1;
            position: relative;
            background: white;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        /* Security/Error Overlay */
        #error-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 5;
        }

        .dihtex-logo-large {
            font-size: 64px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .dihtex-logo-large span:nth-child(1) { color: #4285f4; }
        .dihtex-logo-large span:nth-child(2) { color: #ea4335; }
        .dihtex-logo-large span:nth-child(3) { color: #fbbc05; }
        .dihtex-logo-large span:nth-child(4) { color: #4285f4; }
        .dihtex-logo-large span:nth-child(5) { color: #34a853; }
        .dihtex-logo-large span:nth-child(6) { color: #ea4335; }

        .btn-open {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }

        .btn-open:hover { background-color: #3367d6; }

    </style>
</head>
<body>

    <div class="tab-bar">
        <div class="tab" onclick="goHome()">Dihtex | New Tab</div>
    </div>

    <div class="toolbar">
        <div class="nav-icons">
            <span onclick="goBack()">&#8592;</span>
            <span onclick="reload()">&#8635;</span>
            <span onclick="goHome()">&#8962;</span>
        </div>
        <div class="address-bar-container">
            <input type="text" id="urlInput" placeholder="Search with Dihtex or type a URL" onkeydown="if(event.key==='Enter') navigate()">
        </div>
        <div class="nav-icons"><span>&#8942;</span></div>
    </div>

    <div id="content-area">
        <div id="error-screen">
            <div class="dihtex-logo-large">
                <span>D</span><span>i</span><span>h</span><span>t</span><span>e</span><span>x</span>
            </div>
            <p id="error-msg">This site has security policies that prevent it from loading inside Dihtex.</p>
            <button class="btn-open" id="redirectBtn">Open in New Tab</button>
            <p style="color: #70757a; font-size: 12px; margin-top: 15px;">Tip: Try searching for keywords instead of direct URLs.</p>
        </div>
        <iframe id="viewport" src="https://duckduckgo.com"></iframe>
    </div>

    <script>
        const viewport = document.getElementById('viewport');
        const urlInput = document.getElementById('urlInput');
        const errorScreen = document.getElementById('error-screen');
        const redirectBtn = document.getElementById('redirectBtn');

        function navigate() {
            let input = urlInput.value.trim();
            if (!input) return;

            let targetUrl = input;

            // Check if it's a URL or search
            const isUrl = input.includes('.') && !input.includes(' ');
            
            if (!isUrl) {
                // Search via DuckDuckGo (Friendly to iframes)
                targetUrl = "https://duckduckgo.com/?q=" + encodeURIComponent(input);
            } else {
                if (!input.startsWith('http')) {
                    targetUrl = "https://" + input;
                }
            }

            // List of known sites that block iframes (X-Frame-Options)
            const blockedSites = ['google.com', 'facebook.com', 'youtube.com', 'github.com', 'twitter.com', 'x.com', 'amazon.com', 'netflix.com'];
            const isBlocked = blockedSites.some(site => targetUrl.toLowerCase().includes(site));

            if (isBlocked) {
                showError(targetUrl);
            } else {
                hideError();
                viewport.src = targetUrl;
                urlInput.value = targetUrl;
            }
        }

        function showError(url) {
            errorScreen.style.display = 'flex';
            viewport.style.display = 'none';
            redirectBtn.onclick = () => window.open(url, '_blank');
        }

        function hideError() {
            errorScreen.style.display = 'none';
            viewport.style.display = 'block';
        }

        function goHome() {
            hideError();
            viewport.src = "https://duckduckgo.com";
            urlInput.value = "";
        }

        function reload() {
            viewport.src = viewport.src;
        }

        function goBack() {
            window.history.back();
        }
    </script>
</body>
</html>
