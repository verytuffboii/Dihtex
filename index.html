<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dihtex - The Unlocked Browser</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; background: #f1f3f4; overflow: hidden; }
        
        /* Chromium Style UI */
        .toolbar { background: white; padding: 10px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #ccc; z-index: 100; }
        .nav-btn { cursor: pointer; border: none; background: #eee; padding: 8px 12px; border-radius: 5px; font-weight: bold; }
        #urlInput { flex-grow: 1; padding: 10px 20px; border-radius: 20px; border: 1px solid #dfe1e5; outline: none; font-size: 14px; }
        
        #view-container { flex-grow: 1; background: white; position: relative; }
        iframe { width: 100%; height: 100%; border: none; background: white; }

        /* Welcome Overlay */
        #home-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 5;
        }
        .logo { font-size: 72px; font-weight: bold; margin-bottom: 20px; letter-spacing: -2px; }
        .logo span:nth-child(1) { color: #4285f4; } .logo span:nth-child(2) { color: #ea4335; }
        .logo span:nth-child(3) { color: #fbbc05; } .logo span:nth-child(4) { color: #4285f4; }
        .logo span:nth-child(5) { color: #34a853; } .logo span:nth-child(6) { color: #ea4335; }
    </style>
</head>
<body>

    <div class="toolbar">
        <button class="nav-btn" onclick="goHome()">🏠</button>
        <button class="nav-btn" onclick="document.getElementById('viewport').contentWindow.history.back()">←</button>
        <input type="text" id="urlInput" placeholder="Search Google-style or type a URL" onkeydown="if(event.key==='Enter') doSearch()">
        <button class="nav-btn" style="background: #4285f4; color: white; border-radius: 20px;" onclick="doSearch()">Search</button>
    </div>

    <div id="view-container">
        <div id="home-screen">
            <div class="logo"><span>D</span><span>i</span><span>h</span><span>t</span><span>e</span><span>x</span></div>
            <p style="color: #70757a;">The only browser that doesn't use new tabs.</p>
        </div>

        <iframe id="viewport" name="viewport"></iframe>
    </div>

    <script>
        const frame = document.getElementById('viewport');
        const home = document.getElementById('home-screen');
        const addrBar = document.getElementById('urlInput');

        function doSearch() {
            let val = addrBar.value.trim();
            if(!val) return;

            home.style.display = 'none';
            
            // Logic: Is it a URL?
            if (val.includes('.') && !val.includes(' ')) {
                let url = val.startsWith('http') ? val : 'https://' + val;
                frame.src = url;
            } else {
                // GOOGLE SEARCH WITHOUT REDIRECTS:
                // We use a public Whoogle instance. It looks like Google,
                // gives Google results, but stays inside the iframe!
                frame.src = "https://search.garudalinux.org/search?q=" + encodeURIComponent(val);
            }
        }

        function goHome() {
            home.style.display = 'flex';
            frame.src = 'about:blank';
            addrBar.value = '';
        }

        // To make "time in..." work instantly, we use the search results 
        // which now load perfectly in the window.
    </script>
</body>
</html>
