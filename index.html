<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dihtex | Chromium Pro</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; background: #f1f3f4; overflow: hidden; }
        .toolbar { background: white; padding: 8px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #ccc; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        #urlInput { flex-grow: 1; padding: 10px 20px; border-radius: 20px; border: 1px solid #dfe1e5; outline: none; font-size: 14px; }
        .nav-btn { cursor: pointer; border: none; background: #eee; padding: 8px 15px; border-radius: 5px; font-weight: bold; color: #5f6368; }
        .nav-btn:hover { background: #e0e0e0; }
        
        #view-container { flex-grow: 1; position: relative; background: #fff; }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* The Welcome Screen */
        #welcome { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 10; 
        }
        .logo { font-size: 70px; font-weight: bold; margin-bottom: 20px; }
        .logo span:nth-child(odd) { color: #4285f4; }
        .logo span:nth-child(even) { color: #ea4335; }
    </style>
</head>
<body>

    <div class="toolbar">
        <button class="nav-btn" onclick="home()">Home</button>
        <input type="text" id="urlInput" placeholder="Search or type URL (e.g. wikipedia.org)" onkeydown="if(event.key==='Enter') browse()">
        <button class="nav-btn" onclick="browse()" style="background: #4285f4; color: white;">Go</button>
    </div>

    <div id="view-container">
        <div id="welcome">
            <div class="logo">Dihtex</div>
            <p>Type a site like <b>wikipedia.org</b> or <b>example.com</b> above.</p>
            <p style="font-size: 12px; color: #888;">Note: High-security sites (Google/YouTube) will open in a new tab.</p>
        </div>
        <iframe id="viewport"></iframe>
    </div>

    <script>
        const frame = document.getElementById('viewport');
        const input = document.getElementById('urlInput');
        const welcome = document.getElementById('welcome');

        function browse() {
            let val = input.value.trim();
            if(!val) return;

            let url = val;
            if(!val.startsWith('http')) {
                if(val.includes('.') && !val.includes(' ')) {
                    url = 'https://' + val;
                } else {
                    // Using a Search Engine that is currently iframe-friendly
                    url = 'https://www.ecosia.org/search?q=' + encodeURIComponent(val);
                }
            }

            // LIST OF SITES THAT WILL FAIL IN IFRAMES
            const restricted = ['google', 'youtube', 'facebook', 'github', 'twitter', 'x.com', 'duckduckgo'];
            const needsExternal = restricted.some(s => url.toLowerCase().includes(s));

            if(needsExternal) {
                if(confirm("This site (Google/YT/GitHub) blocks being inside Dihtex. Open in a real new tab?")) {
                    window.open(url, '_blank');
                }
            } else {
                welcome.style.display = 'none';
                // We use a CORS Proxy for general websites to help them load
                // Remove the proxy if you only want to visit "friendly" sites
                frame.src = url; 
            }
        }

        function home() {
            welcome.style.display = 'flex';
            frame.src = 'about:blank';
            input.value = '';
        }
    </script>
</body>
</html>
