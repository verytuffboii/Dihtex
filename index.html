<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dihtex Pro</title>
    <style>
        :root { --bg: #0b0e14; --accent: #38bdf8; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .toolbar { background: var(--glass); backdrop-filter: blur(10px); padding: 10px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        #addrBar { flex-grow: 1; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 10px; color: white; outline: none; }

        #home-screen { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle at center, #1e293b 0%, #0b0e14 100%); }
        .logo { font-size: 100px; font-weight: 900; background: linear-gradient(to bottom right, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 20px rgba(56, 189, 248, 0.4)); margin-bottom: 10px; }
        .tagline { color: #94a3b8; margin-bottom: 40px; font-size: 14px; letter-spacing: 2px; }

        .search-wrap { width: 550px; position: relative; }
        .main-search { width: 100%; padding: 18px 30px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.2); background: var(--glass); color: white; font-size: 18px; outline: none; transition: 0.3s; }
        .main-search:focus { border-color: var(--accent); box-shadow: 0 0 25px rgba(56, 189, 248, 0.3); background: rgba(255,255,255,0.1); }

        .shortcuts { display: flex; gap: 30px; margin-top: 50px; }
        .s-item { cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 10px; transition: 0.2s; opacity: 0.8; }
        .s-item:hover { transform: translateY(-5px); opacity: 1; }
        .s-icon { width: 60px; height: 60px; background: var(--glass); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 28px; border: 1px solid rgba(255,255,255,0.1); }

        webview { width: 100%; height: 100%; display: none; background: white; }
    </style>
</head>
<body>
    <div class="toolbar">
        <button onclick="goHome()" style="background:none; border:none; color:white; cursor:pointer; font-size:20px;">🏠</button>
        <input type="text" id="addrBar" placeholder="Search or type URL" onkeydown="if(event.key==='Enter') doSearch(this.value)">
    </div>

    <div id="home-screen">
        <div class="logo">Dihtex</div>
        <div class="tagline">SMART SEARCH UNBLOCKED</div>
        <div class="search-wrap">
            <input type="text" class="main-search" placeholder="Search Google..." onkeydown="if(event.key==='Enter') doSearch(this.value)">
        </div>
        <div class="shortcuts">
            <div class="s-item" onclick="doSearch('youtube.com')"><div class="s-icon">📺</div><span>YouTube</span></div>
            <div class="s-item" onclick="doSearch('roblox.com')"><div class="s-icon">🎮</div><span>Roblox</span></div>
            <div class="s-item" onclick="doSearch('discord.com')"><div class="s-icon">💬</div><span>Discord</span></div>
        </div>
    </div>

    <webview id="viewport" src="about:blank" partition="persist:dihtex_profile" allowpopups></webview>

    <script>
        const view = document.getElementById('viewport');
        const home = document.getElementById('home-screen');
        const bar = document.getElementById('addrBar');

        function doSearch(val) {
            if(!val) return;
            home.style.display = 'none';
            view.style.display = 'flex';
            let url = (val.includes('.') && !val.includes(' ')) ? (val.startsWith('http') ? val : 'https://' + val) : "https://www.google.com/search?q=" + encodeURIComponent(val);
            view.setUserAgent("Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36");
            view.src = url;
            bar.value = url;
        }

        function goHome() { home.style.display = 'flex'; view.style.display = 'none'; view.src = 'about:blank'; bar.value = ''; }
    </script>
</body>
</html>
